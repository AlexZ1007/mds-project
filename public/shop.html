<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Uncial+Antiqua&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>
<body class="bg-gray-100 font-sans h-full flex flex-col">
  
  <header>
    <div class="w-full text-center mt-6 mb-6"></div>
      <h1 class="text-4xl font-bold text-center mb-6" style="font-family: 'Cinzel', serif;">Card Shop</h1>
    </div>
  </header>

  <main class="flex-grow w-full max-w-6xl p-6 mx-auto flex flex-col justify-center items-center">
    <div class="space-y-6 text-center">
      <h2 class="text-2xl font-semibold">Open Packs</h2>
      <div class="flex justify-center space-x-6">
        <button onclick="openPack({type: 1, cost: 10})" class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg">
          Open Pack (1 Card - 10 Coins)
        </button>
        <button onclick="openPack({type: 2, cost: 20})" class="bg-purple-500 hover:bg-purple-600 text-white px-6 py-3 rounded-lg shadow-lg">
          Open Pack (3 Cards - 20 Coins)
        </button>
      </div>
      <div id="pack-result" class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-6">
      </div>
    </div>
  </main>

  <footer class="bg-gradient-to-r from-purple-900 via-indigo-900 to-purple-900 text-yellow-300 text-center p-6 mt-auto font-semibold w-full" style="font-family: 'Cinzel', serif;">
    <p>&copy; 2025 Arcana. All mystical rights reserved.</p>
  </footer>

  <script src="client.js"></script>
</body>
</html>
